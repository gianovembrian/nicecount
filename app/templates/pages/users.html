{% extends "layouts/base.html" %}

{% block content %}
<div id="usersAlert" class="alert alert-danger hidden"></div>

<div class="card">
  <div class="card-header border-0 pt-7">
    <h3 class="card-title m-0">User List</h3>
    <div class="card-toolbar">
      <button class="btn btn-primary app-toolbar-add-btn" type="button" id="openCreateUserModal">
        <span class="app-inline-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        Add User
      </button>
    </div>
  </div>
  <div class="card-body pt-3">
    <div class="table-responsive">
      <table class="table align-middle table-row-dashed fs-6 gy-4 user-table">
        <thead>
          <tr class="text-start text-muted fw-bold fs-7 text-uppercase gs-0">
            <th>No</th>
            <th>Username</th>
            <th>Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="userModalTitle">Add User</h2>
        <button type="button" class="btn btn-sm btn-icon btn-active-light-primary" data-bs-dismiss="modal" aria-label="Close">
          <span class="app-inline-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
      </div>
      <form id="userForm">
        <div class="modal-body py-10 px-lg-17">
          <input type="hidden" name="user_id" />
          <div class="row g-6">
            <div class="col-md-6">
              <label class="form-label fw-semibold required">Username</label>
              <input class="form-control form-control-solid" type="text" name="username" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold required">Full Name</label>
              <input class="form-control form-control-solid" type="text" name="full_name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role</label>
              <select class="form-select form-select-solid" name="is_admin">
                <option value="false">User</option>
                <option value="true">Admin</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Status</label>
              <select class="form-select form-select-solid" name="is_active">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>
            <div class="col-12" id="userPasswordGroup">
              <label class="form-label fw-semibold required">Initial Password</label>
              <input class="form-control form-control-solid" type="password" name="password" minlength="6" placeholder="Minimum 6 characters" />
              <div class="soft-note mt-2">Only required when creating a new user.</div>
            </div>
          </div>
        </div>
        <div class="modal-footer d-flex justify-content-end gap-3">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="userSubmitButton">Save User</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Set Password</h2>
        <button type="button" class="btn btn-sm btn-icon btn-active-light-primary" data-bs-dismiss="modal" aria-label="Close">
          <span class="app-inline-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
      </div>
      <form id="passwordForm">
        <div class="modal-body py-10 px-lg-17">
          <input type="hidden" name="user_id" />
          <div class="mb-7">
            <div class="form-label fw-semibold mb-2">Selected User</div>
            <div id="passwordTarget" class="app-selected-user">No user selected</div>
          </div>
          <div class="mb-7">
            <label class="form-label fw-semibold required">New Password</label>
            <input class="form-control form-control-solid" type="password" name="password" minlength="6" required placeholder="Minimum 6 characters" />
          </div>
          <div>
            <label class="form-label fw-semibold required">Confirm Password</label>
            <input class="form-control form-control-solid" type="password" name="confirm_password" minlength="6" required placeholder="Re-enter the new password" />
          </div>
        </div>
        <div class="modal-footer d-flex justify-content-end gap-3">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-warning">Update Password</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/assets/users.js"></script>
{% endblock %}
