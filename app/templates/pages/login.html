{% extends "layouts/auth.html" %}

{% block content %}
<div class="d-flex flex-column flex-root">
  <div class="login-shell d-flex flex-column flex-column-fluid position-relative">
    <div class="d-flex flex-center flex-column flex-column-fluid p-10 pb-lg-20">
      <div class="login-brand mb-12">
        <div class="login-brand-badge" aria-hidden="true">NC</div>
        <div>
          <div class="login-brand-name">NiceCount</div>
          <div class="login-brand-subtitle">Traffic Video Analysis Platform</div>
        </div>
      </div>
      <div class="w-lg-500px bg-body rounded shadow-sm p-10 p-lg-15 mx-auto login-card">
        <form id="loginForm" class="form w-100" novalidate="novalidate">
          <div class="text-center mb-10">
            <h1 class="text-dark mb-3">Sign In to NiceCount</h1>
            <div class="text-gray-400 fw-bold fs-4">
              Sign in to manage users, upload videos, and run traffic analysis.
            </div>
          </div>

          <div id="loginAlert" class="alert alert-danger hidden"></div>

          <div class="fv-row mb-10">
            <label class="form-label fs-6 fw-bolder text-dark">Username</label>
            <input
              class="form-control form-control-lg form-control-solid"
              type="text"
              name="username"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>

          <div class="fv-row mb-10">
            <div class="d-flex flex-stack mb-2">
              <label class="form-label fw-bolder text-dark fs-6 mb-0">Password</label>
              <span class="text-muted fs-7">Local application access</span>
            </div>
            <input
              class="form-control form-control-lg form-control-solid"
              type="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-lg btn-primary w-100 mb-5">
              <span class="indicator-label">Continue</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="d-flex flex-center flex-column-auto p-10">
      <div class="d-flex align-items-center fw-bold fs-6">
        <a href="/login" class="text-muted text-hover-primary px-2">NiceCount</a>
        <a href="/videos" class="text-muted text-hover-primary px-2">Videos</a>
        <a href="/analysis" class="text-muted text-hover-primary px-2">Analysis</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/assets/login.js"></script>
{% endblock %}
